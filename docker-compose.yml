# ═══════════════════════════════════════════════════════════════
#  CRM Internal — Docker Compose
#  Services: MySQL 8 · FastAPI Backend · React Frontend (Nginx)
# ═══════════════════════════════════════════════════════════════

services:

  # ── 1. MySQL Database ──────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: crm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-crm_db}
    ports:
      - "3307:3306" # 3307 on host to avoid conflict with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - crm_network

  # ── 2. FastAPI Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:root123@db:3306/crm_db}
      SECRET_KEY: ${SECRET_KEY:-docker-super-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      APP_NAME: CRM Internal
      APP_VERSION: 1.0.0
      DEBUG: "false"
      GROQ_API_KEY: ${GROQ_API_KEY:-""}
      # Email SMTP (Gmail)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-""}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-""}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-"FRS - CRM Support"}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - crm_network

  # ── 3. React Frontend (Nginx) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: crm_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - crm_network

  backend_unit_tests:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: [ "test" ]
    environment:
      DATABASE_URL: sqlite:///./test_unit.db
      SECRET_KEY: ${SECRET_KEY:-docker-super-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_NAME: CRM Internal
      APP_VERSION: 1.0.0
      DEBUG: "false"
    command: [ "pytest", "-q", "tests/test_auth.py", "tests/test_crm.py" ]
    networks:
      - crm_network

  backend_integration_tests:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: [ "test" ]
    environment:
      INTEGRATION_BASE_URL: http://backend:8000/api/v1
      INTEGRATION_HEALTH_URL: http://backend:8000/health
    command: [ "pytest", "-q", "tests_integration" ]
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm_network

  frontend_tests:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    profiles: [ "test" ]
    command: [ "npm", "run", "test" ]
    networks:
      - crm_network

  mobile_tests:
    build:
      context: ./mobile
      dockerfile: Dockerfile.test
    profiles: [ "test" ]
    command: [ "npm", "run", "test" ]
    networks:
      - crm_network

volumes:
  mysql_data:
    driver: local

networks:
  crm_network:
    driver: bridge
